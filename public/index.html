<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0a0a0a" />
    <meta name="description" content="Maison Deluxe — Luxury Beauty, Nails & Jewellery. Elevate. Express. Empower." />
    <meta property="og:title" content="Maison Deluxe" />
    <meta property="og:description" content="Luxury Beauty, Nails & Jewellery — Elevate. Express. Empower." />
    <meta property="og:image" content="/logo.jpg" />
    <title>Maison Deluxe</title>
    <link rel="icon" href="/logo.jpg" />

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Montserrat:wght@200;300;400;500;600&family=Cinzel:wght@400;600;700&display=swap" rel="stylesheet" />

    <!-- GSAP -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>

    <style>
      :root {
        --rose: #C4956A;
        --rose-light: #E8BFA0;
        --rose-dark: #8B5E3C;
        --crimson: #8B1A1A;
        --black: #0a0a0a;
        --surface: #111010;
        --surface2: #1a1818;
        --text: #F0E6DC;
        --text-muted: rgba(240,230,220,0.6);
      }
      *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
      html { scroll-behavior: smooth; }
      body {
        background: var(--black);
        color: var(--text);
        font-family: 'Cormorant Garamond', serif;
        overflow-x: hidden;
      }
      ::-webkit-scrollbar { width: 4px; }
      ::-webkit-scrollbar-track { background: #000; }
      ::-webkit-scrollbar-thumb { background: var(--rose-dark); border-radius: 2px; }

      @keyframes fadeUp {
        from { opacity: 0; transform: translateY(30px); }
        to { opacity: 1; transform: translateY(0); }
      }
      @keyframes shimmer {
        0% { background-position: -200% center; }
        100% { background-position: 200% center; }
      }
      @keyframes float {
        0%, 100% { transform: translateY(0px); }
        50% { transform: translateY(-8px); }
      }
      @keyframes scrollDot {
        0% { transform: translateY(0); opacity: 1; }
        100% { transform: translateY(12px); opacity: 0; }
      }
    </style>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
  </body>
</html>
